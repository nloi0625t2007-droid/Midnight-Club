<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Club | Moonlight Edition</title>
    <style>
        /* Toàn bộ giao diện */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hiệu ứng bầu trời sao */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Ánh trăng */
        .moon {
            position: absolute;
            top: 50px;
            right: 80px;
            width: 120px;
            height: 120px;
            background: #fefcd7;
            border-radius: 50%;
            box-shadow: 0 0 50px 15px rgba(254, 252, 215, 0.4);
            z-index: 1;
            animation: moonGlow 4s infinite alternate;
        }

        @keyframes moonGlow {
            from { box-shadow: 0 0 40px 10px rgba(254, 252, 215, 0.3); }
            to { box-shadow: 0 0 60px 20px rgba(254, 252, 215, 0.5); }
        }

        /* Khung nội dung chính */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        /* Khung Logo */
        .logo-frame {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .logo-frame:hover {
            transform: scale(1.05);
            border-color: #fefcd7;
        }

        .logo-frame img {
            max-width: 80%;
            opacity: 0.8;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fefcd7;
            text-shadow: 0 0 10px rgba(254, 252, 215, 0.8);
        }

        /* Menu điều hướng */
        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-link {
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            padding: 12px 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-link:hover {
            background: #fefcd7;
            color: #090A0F;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(254, 252, 215, 0.3);
        }

    </style>
</head>
<body>

    <div class="stars-container" id="starField"></div>

    <div class="moon"></div>

    <div class="container">
        <div class="logo-frame">
            <img src="image.png" alt="Group Logo">
        </div>

        <h1>Midnight Club</h1>

        <nav>
            <a href="#" class="nav-link">Thành viên nhóm</a>
            <a href="#" class="nav-link">Đơn xin vào nhóm</a>
        </nav>
    </div>

    <script>
        // Tạo sao ngẫu nhiên
        const starField = document.getElementById('starField');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            
            const duration = Math.random() * 3 + 2 + 's';
            star.style.setProperty('--duration', duration);
            
            starField.appendChild(star);
        }
    </script>
</body>
</html>
